      <path d="M110 200 C118 152 145 120 170 120 C198 122 223 152 230 200" fill="#2f241d"/>
      <path d="M70 316 C78 248 114 230 170 230 C228 230 262 250 270 316 L270 450 L70 450 Z" fill="#36507c"/>
