  <text x="700" y="1360" text-anchor="middle" fill="#d4a438" font-family="Georgia, serif" font-size="46">A Browser RPG Meets Dating Sim Atmosphere</text>
  <text x="700" y="1430" text-anchor="middle" fill="#e8e2d6" font-family="Georgia, serif" font-size="34">Build relationships in town. Hunt monsters beyond the gates.</text>

  <g transform="translate(170,1540)">
    <rect x="0" y="0" width="1060" height="280" rx="14" fill="#151d30" stroke="#d4a438" stroke-opacity="0.3"/>
    <text x="40" y="64" fill="#d4a438" font-family="Georgia, serif" font-size="40">Art Notes</text>
    <text x="40" y="118" fill="#e8e2d6" font-family="Georgia, serif" font-size="30">• Keep silhouettes bold, readable at low resolutions.</text>
    <text x="40" y="166" fill="#e8e2d6" font-family="Georgia, serif" font-size="30">• Push warm gold accents against cool navy environments.</text>
    <text x="40" y="214" fill="#e8e2d6" font-family="Georgia, serif" font-size="30">• Prioritize expressive portraits for social scenes.</text>
  </g>
