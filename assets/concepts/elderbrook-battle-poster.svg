      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#090d17"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3cc72"/>
      <stop offset="100%" stop-color="#b98924"/>
