<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elderbrook</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <section id="player-setup" class="player-setup" aria-label="Player setup">
      <div class="setup-card">
        <h2 class="setup-title">Create Your Adventurer</h2>
        <p class="setup-subtitle">Choose who you are before stepping into Elderbrook.</p>

        <div class="setup-body">
          <div class="setup-portrait-panel">
            <img id="setup-portrait" class="setup-portrait" src="assets/portraits/male-player.png" alt="Player portrait" />
          </div>

          <form id="player-setup-form" class="setup-form">
          <label class="setup-label" for="player-name">Name</label>
          <input id="player-name" name="playerName" class="setup-input" type="text" maxlength="20" required />

          <fieldset class="setup-fieldset">
            <legend>Gender</legend>
            <label><input type="radio" name="gender" value="male" checked /> Male</label>
            <label><input type="radio" name="gender" value="female" /> Female</label>
          </fieldset>

          <label class="setup-label" for="player-origin">Origin</label>
          <select id="player-origin" name="origin" class="setup-input">
            <option value="brookfield">Brookfield Hamlet</option>
            <option value="ironvale">Ironvale Outpost</option>
            <option value="northwatch">Northwatch Border</option>
          </select>

          <label class="setup-label" for="player-archetype">Archetype</label>
          <select id="player-archetype" name="archetype" class="setup-input">
            <option value="sellsword">Sellsword</option>
            <option value="ranger">Ranger</option>
            <option value="arcanist">Arcanist</option>
          </select>

          <p id="setup-error" class="setup-error" aria-live="polite"></p>

          <button class="primary-btn setup-submit" type="submit">Begin Journey</button>
          </form>
        </div>
      </div>
    </section>

    <main class="app-shell" aria-label="Elderbrook game">
      <section id="game-stage" class="game-stage" aria-live="polite">
        <div id="background-layer" class="background-layer"></div>
        <div id="npc-layer" class="npc-layer" aria-label="Scene interactions"></div>

        <img id="portrait-left" class="portrait portrait-left" alt="Left character portrait" />
        <img id="portrait-right" class="portrait portrait-right" alt="Right character portrait" />

        <header class="hud">
          <h1 class="game-title">Elderbrook</h1>
          <div class="hud-details">
            <p id="player-label">Player: Traveler</p>
            <p id="location-label">Location: -</p>
            <p id="chapter-label">Chapter: Prologue</p>
            <p id="gold-label">Gold: 0</p>
            <p id="hp-label">HP: 20 / 20</p>
          </div>
        </header>
      </section>

      <section class="dialogue-panel" aria-label="Dialogue and choices">
        <div class="speaker-row">
          <p id="speaker-name" class="speaker-name">Narrator</p>
          <button id="skip-button" class="secondary-btn" type="button">Skip Line</button>
        </div>

        <p id="dialogue-text" class="dialogue-text">
          The wind over Elderbrook carries stories of old ruins and stranger things.
        </p>

        <div id="choice-list" class="choice-list" role="list"></div>

        <div class="panel-actions">
          <button id="continue-button" class="primary-btn" type="button">Continue</button>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
